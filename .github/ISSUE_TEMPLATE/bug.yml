name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: "Thanks for taking the time to report a bug. Please fill out the sections below."
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Step-by-step instructions to reproduce the issue.
      placeholder: "1. Install...\n2. Load workflow...\n3. Run..."
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS
      placeholder: "Windows 11 / Ubuntu 22.04"
    validations:
      required: true
  - type: input
    id: gpu
    attributes:
      label: GPU & Driver Version
      placeholder: "RTX 4090, driver 572.xx"
    validations:
      required: true
  - type: input
    id: workflow
    attributes:
      label: Affected Workflow(s)
      placeholder: "e.g. 03-targeted-inpainting"
