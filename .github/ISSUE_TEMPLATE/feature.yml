name: Feature Request
description: Suggest a new workflow or enhancement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: "Describe the feature or workflow you'd like to see added."
  - type: textarea
    id: problem
    attributes:
      label: Problem / Motivation
      description: What problem does this solve? What use case does it address?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
